<!DOCTYPE html>
<html lang="af">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
    <title>Genshin Training Guide</title>
    <style>
        body { 
            background-image: url('CHARACTER.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: sans-serif; display: flex; justify-content: center; 
            padding: 20px; overflow: hidden; height: 100vh; margin: 0;
        }
        .main-container { display: flex; gap: 20px; max-width: 1400px; width: 100%; height: 95vh; align-items: flex-start; }
        
        .grid-wrapper::-webkit-scrollbar, .training-guide::-webkit-scrollbar { width: 8px; }
        .grid-wrapper::-webkit-scrollbar-track, .training-guide::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        .grid-wrapper::-webkit-scrollbar-thumb, .training-guide::-webkit-scrollbar-thumb { 
            background: #000; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); 
        }

        .filters {
            display: flex; gap: 10px; margin-bottom: 15px; background: rgba(0, 0, 0, 0.75); 
            padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
        }
        .back-btn { padding: 8px 15px; border-radius: 6px; border: none; background: #fbc02d; color: #333; font-weight: bold; cursor: pointer; }
        .grid-wrapper { flex-basis: 460px; height: 100%; overflow-y: auto; padding-right: 5px; scroll-behavior: smooth; }
        .character-grid { display: grid; grid-template-columns: repeat(4, 95px); grid-gap: 15px; }
        
        .char-card {
            width: 95px; height: 115px; background-color: rgba(255, 255, 255, 0.9); 
            border-radius: 10px; cursor: pointer; position: relative; color: #333;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }
        .char-icon { width: 100%; height: 80px; background-size: cover; background-position: center; }
        
        .done-check { 
            position: absolute; 
            bottom: 4px; 
            left: 4px; 
            width: 20px; height: 20px; 
            background-color: #2e7d32; border-radius: 50%; display: none; 
            align-items: center; justify-content: center; color: white; font-size: 12px; border: 2px solid white;
            z-index: 2;
        }
        .all-done .done-check { display: flex; }

        /* Owned merksie — bo-regs sodat element ikoon sigbaar bly */
        .owned-toggle-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.55);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
            transition: 0.2s;
            color: rgba(255,255,255,0.25);
        }
        .owned-toggle-btn.is-owned {
            background: #2e7d32;
            border-color: #4caf50;
            color: white;
        }
        .owned-toggle-btn:hover { transform: scale(1.2); }

        .card-lv {
            font-size: 15px !important; 
            font-weight: 900 !important; 
            color: #000 !important; 
            margin-top: 2px;
            margin-left: 22px; 
            width: 100%;
            text-align: left;
        }

        .training-guide { 
            flex-grow: 1; background-color: rgba(0, 0, 0, 0.75); padding: 35px; 
            border-radius: 20px; height: 90%; overflow-y: auto; scroll-behavior: smooth;
        }

        .status-circle { 
            width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; transition: 0.2s;
        }

        #owned-indicator { color: transparent; background-color: transparent; }
        .is-owned #owned-indicator { color: #4caf50; border-color: #4caf50; }
        
        .guide-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .header-owned { display: flex; align-items: center; gap: 10px; margin-top: 10px; cursor: pointer; width: fit-content; }
        .header-owned span { font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
<div class="main-container">
    <div class="grid-wrapper">
        <div class="filters">
            <button class="back-btn" onclick="window.location.href='Dashboard.html'">🏠 Dashboard View</button>
            <select id="f-rarity" onchange="filter()"><option value="all">Rarity</option><option value="5">5 Ster</option><option value="4">4 Ster</option></select>
            <select id="f-element" onchange="filter()"><option value="all">Element</option><option value="Anemo">Anemo</option><option value="Geo">Geo</option><option value="Electro">Electro</option><option value="Dendro">Dendro</option><option value="Hydro">Hydro</option><option value="Pyro">Pyro</option><option value="Cryo">Cryo</option></select>
            <select id="f-owned" onchange="filter()"><option value="all">Own</option><option value="owned">Owned</option><option value="unowned">Unowned</option></select>
        </div>
        <div class="character-grid" id="grid"></div>
    </div>
    
    <div class="training-guide" id="guide-box" style="display:none;">
        <div style="display:flex; align-items:center; gap:25px; margin-bottom:30px;">
            <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
                <div id="p-pic" style="width:130px; height:130px; border-radius:50%; border:4px solid #fbc02d; background-size:cover;"></div>
                <div id="guide-lv" style="display:none; color:#ffe14b; font-weight:bold; font-size:26px; background:rgba(0,0,0,0.7); padding:6px 16px; border-radius:8px; margin-top:6px; letter-spacing:1px; text-shadow:1px 1px 4px #000;"></div>
            </div>
            <div>
                <h1 id="active-name" style="color:#fbc02d; margin:0; font-size:32px;"></h1>
                <div class="header-owned" id="main-owned-toggle" onclick="toggleOwned()">
                    <div class="status-circle" id="owned-indicator">✓</div>
                    <span>Owned</span>
                </div>
            </div>
        </div>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">
        <div id="tasks"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBoCKHkd1FhfNeFMnJInkqqgiX0GCjAJAQ",
    authDomain: "trinityapp-28019.firebaseapp.com",
    databaseURL: "https://trinityapp-28019-default-rtdb.firebaseio.com",
    projectId: "trinityapp-28019",
    storageBucket: "trinityapp-28019.firebasestorage.app",
    messagingSenderId: "72035223407",
    appId: "1:72035223407:web:b1a40d9ce96ae479be4a9a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Gebruik die ingetekende gebruiker se uid
let currentUsername = localStorage.getItem('trinity_uid') || "Admin";

// Luister vir data vanaf Firebase
onValue(ref(db, 'users/' + currentUsername + '/ownedCharacters'), (snapshot) => {
    const data = snapshot.val();
    if (data) {
        const arr = Array.isArray(data) ? data : Object.values(data);
        localStorage.setItem('ownedCharacters', JSON.stringify(arr));
        window.ownedFromStorage = arr;
        Object.keys(window.characters).forEach(name => {
            window.characters[name].o = window.ownedFromStorage.includes(name);
        });
        if (typeof window.filter === "function") window.filter();
    }
});

onValue(ref(db, 'users/' + currentUsername + '/characterDetails'), (snapshot) => {
    const data = snapshot.val();
    if (data) {
        localStorage.setItem('characterDetails', JSON.stringify(data));
        if (typeof window.filter === "function") window.filter();
    }
});

onValue(ref(db, 'users/' + currentUsername + '/guideProgress'), (snapshot) => {
    const data = snapshot.val();
    if (data) {
        localStorage.setItem('guideProgress', JSON.stringify(data));
        window.guideProgress = data;
        if (typeof window.filter === "function") window.filter();
        if (window.refreshCurrentCircles) window.refreshCurrentCircles();
    }
});

// Sync na Firebase
window.syncFirebase = function() {
    const owned = JSON.parse(localStorage.getItem('ownedCharacters')) || [];
    set(ref(db, 'users/' + currentUsername + '/ownedCharacters'), owned);
};
</script>

:{r:5,e:"Geo",o:false},"Linnea":{r:5,e:"Geo",o:false} };

    window.ownedFromStorage = JSON.parse(localStorage.getItem('ownedCharacters')) || [];
    window.guideProgress = JSON.parse(localStorage.getItem('guideProgress')) || {};

    Object.keys(window.characters).forEach(name => {
        window.characters[name].o = window.ownedFromStorage.includes(name);
    });

    let current = null;

    function getCharLV(name) {
        const charDetails = JSON.parse(localStorage.getItem('characterDetails')) || {};
        const data = charDetails[name];
        if (!data) return null;
        const lvFrom = data['sel_1'] || '';
        const lvTo = data['sel_2'] || '';
        if (lvFrom || lvTo) return { from: lvFrom, to: lvTo };
        return null;
    }

    function updateCardLV(name) {
        const card = document.getElementById('card-'+name.replace(/\s+/g,'-'));
        if (!card) return;
        const lvDiv = card.querySelector('.card-lv');
        if (!lvDiv) return;
        if (window.characters[name].o) {
            const lv = getCharLV(name);
            lvDiv.style.display = 'block';
            lvDiv.textContent = lv && lv.from ? `LV: ${lv.from}` : '';
        } else {
            lvDiv.style.display = 'none';
        }
    }

    // Vinnige owned toggle van prentjie klik
    window.quickToggleOwned = function(name) {
        let owned = JSON.parse(localStorage.getItem('ownedCharacters')) || [];
        const isOwned = owned.includes(name);
        if (isOwned) owned = owned.filter(n => n !== name);
        else owned.push(name);
        localStorage.setItem('ownedCharacters', JSON.stringify(owned));
        window.ownedFromStorage = owned;
        if (window.characters[name]) window.characters[name].o = !isOwned;
        const btn = document.getElementById('own-btn-' + name.replace(/\s+/g, '-'));
        if (btn) { if (!isOwned) btn.classList.add('is-owned'); else btn.classList.remove('is-owned'); }
        if (window.syncFirebase) window.syncFirebase();
        if (current === name) updateOwnedUI();
    };

    window.toggleOwned = function() {
        if (!current) return;
        window.characters[current].o = !window.characters[current].o;
        let owned = JSON.parse(localStorage.getItem('ownedCharacters')) || [];
        if (window.characters[current].o) {
            if (!owned.includes(current)) owned.push(current);
        } else {
            owned = owned.filter(name => name !== current);
        }
        localStorage.setItem('ownedCharacters', JSON.stringify(owned));
        
        if (window.syncFirebase) window.syncFirebase();

        updateOwnedUI();
        updateCardLV(current);
        updateGuideLV(current);
        filter();
    }

    function updateOwnedUI() {
        const container = document.getElementById('main-owned-toggle');
        if (window.characters[current].o) {
            container.classList.add('is-owned');
        } else {
            container.classList.remove('is-owned');
        }
    }

    function updateGuideLV(name) {
        const lvEl = document.getElementById('guide-lv');
        if (!lvEl) return;
        if (window.characters[name] && window.characters[name].o) {
            const lv = getCharLV(name);
            if (lv && lv.from) {
                lvEl.textContent = lv.to ? `LV: ${lv.from} → ${lv.to}` : `LV: ${lv.from}`;
                lvEl.style.fontSize = '18px';
                lvEl.style.display = '';
                lvEl.style.color = '#fff';
            } else {
                lvEl.style.display = 'none';
            }
        } else {
            lvEl.style.display = 'none';
        }
    }

    // Expose current character for Firebase listener refresh
    window.refreshCurrentCircles = function() {
        if (!current) return;
        const guideColors = ['rgb(85, 85, 85)', 'rgb(76, 175, 80)', 'rgb(255, 152, 0)', 'rgb(244, 67, 54)'];
        const charProg = window.guideProgress[current] || {};
        const taskList = ["Character", "Weapons [Now]", "Artifacts", "Talents", "Ascension", "Weapon [Future] ★★★★", "Weapon [Future] ★★★★★"];
        taskList.forEach(t => {
            const circleId = 'tg-circle-' + t.replace(/\s+/g,'-').replace(/[★]/g,'s');
            const circleEl = document.getElementById(circleId);
            if (circleEl) {
                const colorIdx = charProg[t];
                const color = (colorIdx !== undefined) ? guideColors[colorIdx] : 'rgb(85, 85, 85)';
                circleEl.style.backgroundColor = color;
                circleEl.style.borderColor = color;
            }
        });
    };

    window.filter = function() {
        const r = document.getElementById('f-rarity').value;
        const e = document.getElementById('f-element').value;
        const o = document.getElementById('f-owned').value;
        Object.keys(window.characters).forEach(name => {
            const card = document.getElementById('card-'+name.replace(/\s+/g,'-'));
            if(!card) return;
            const mR = r==='all' || window.characters[name].r.toString()===r;
            const mE = e==='all' || window.characters[name].e===e;
            const mO = o==='all' || (o==='owned'?window.characters[name].o:!window.characters[name].o);
            card.style.display = (mR && mE && mO) ? 'flex' : 'none';
            checkAllDoneUI(name);
            updateCardLV(name);
        });
    }

    Object.keys(window.characters).forEach(name => {
        const card = document.createElement('div');
        card.className = 'char-card'; card.id = 'card-'+name.replace(/\s+/g,'-');
        const img = name.includes("Traveler") ? window.characters[name].e + "1.jpg" : name + "1.jpg";
        const isOwned = window.characters[name].o;
        card.innerHTML = `
            <div class="done-check">✓</div>
            <div class="owned-toggle-btn ${isOwned ? 'is-owned' : ''}" 
                id="own-btn-${name.replace(/\s+/g,'-')}"
                onclick="event.stopPropagation(); quickToggleOwned('${name}')" 
                title="Toggle Owned">✓</div>
            <div class="char-icon" style="background-image:url('${img}')"></div>
            <div style="padding:5px; width:100%; box-sizing:border-box;">
                <div class="card-lv" style="display:none;"></div>
            </div>`;
        
        card.onclick = () => {
            current = name; 
            document.getElementById('guide-box').style.display='block';
            document.getElementById('active-name').innerText = name;
            document.getElementById('p-pic').style.backgroundImage = `url('${name.includes("Traveler")?window.characters[name].e+".jpg":name+".jpg"}')`;
            
            updateOwnedUI();

            const tBox = document.getElementById('tasks'); tBox.innerHTML = '';
            const taskList = ["Character", "Weapons [Now]", "Artifacts", "Talents", "Ascension", "Weapon [Future] ★★★★", "Weapon [Future] ★★★★★"];
            
            taskList.forEach(t => {
                const row = document.createElement('div'); 
                row.className = `guide-item-row`;
                row.setAttribute('data-task', t);
                row.innerHTML = `
                    <div style="font-size:20px; font-weight:bold;">${t}</div>
                    <div class="status-circle" id="tg-circle-${t.replace(/\s+/g,'-').replace(/[★]/g,'s')}" style="cursor:default;" title="Wys kleur van CharacterView"></div>`;
                tBox.appendChild(row);
            });

            updateGuideLV(name);
            
            // Read colors from guideProgress (synced from CharacterView via Firebase)
            const guideColors = ['rgb(85, 85, 85)', 'rgb(76, 175, 80)', 'rgb(255, 152, 0)', 'rgb(244, 67, 54)'];
            const charProg = window.guideProgress[name] || {};
            taskList.forEach(t => {
                const circleId = 'tg-circle-' + t.replace(/\s+/g,'-').replace(/[★]/g,'s');
                const circleEl = document.getElementById(circleId);
                if (circleEl) {
                    const colorIdx = charProg[t];
                    const color = (colorIdx !== undefined) ? guideColors[colorIdx] : 'rgb(85, 85, 85)';
                    circleEl.style.backgroundColor = color;
                    circleEl.style.borderColor = color;
                }
            });
        };
        document.getElementById('grid').appendChild(card);
    });

    // taskToCircleIndex no longer needed - colors read from guideProgress

    function checkAllDoneUI(charName) {
        const card = document.getElementById('card-'+charName.replace(/\s+/g,'-'));
        if (!card) return;
        const prog = window.guideProgress[charName] || {};
        const coreTasks = ["Character", "Weapons [Now]", "Artifacts", "Talents", "Ascension"];
        const allGreen = coreTasks.every(t => prog[t] === 1);
        card.classList.toggle('all-done', allGreen);
    }
    
    window.filter();
</script>
</body>
</html>
