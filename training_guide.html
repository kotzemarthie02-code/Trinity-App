<!DOCTYPE html>
<html lang="af">
<head>
    <meta charset="UTF-8">
    <title>Genshin Training Guide</title>
    <style>
        body { 
            background-image: url('CHARACTER.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: sans-serif; display: flex; justify-content: center; 
            padding: 20px; overflow: hidden; height: 100vh; margin: 0;
        }
        .main-container { display: flex; gap: 20px; max-width: 1400px; width: 100%; height: 95vh; align-items: flex-start; }
        
        /* Swart Smooth Scrollbars */
        .grid-wrapper::-webkit-scrollbar, .training-guide::-webkit-scrollbar { width: 8px; }
        .grid-wrapper::-webkit-scrollbar-track, .training-guide::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        .grid-wrapper::-webkit-scrollbar-thumb, .training-guide::-webkit-scrollbar-thumb { 
            background: #000; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); 
        }

        .filters {
            display: flex; gap: 10px; margin-bottom: 15px; background: rgba(0, 0, 0, 0.75); 
            padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
        }
        .back-btn { padding: 8px 15px; border-radius: 6px; border: none; background: #fbc02d; color: #333; font-weight: bold; cursor: pointer; }
        .grid-wrapper { flex-basis: 460px; height: 100%; overflow-y: auto; padding-right: 5px; scroll-behavior: smooth; }
        .character-grid { display: grid; grid-template-columns: repeat(4, 95px); grid-gap: 15px; }
        
        .char-card {
            width: 95px; height: 115px; background-color: rgba(255, 255, 255, 0.9); 
            border-radius: 10px; cursor: pointer; position: relative; color: #333;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }
        .char-icon { width: 100%; height: 80px; background-size: cover; background-position: center; }
        
        .done-check { 
            position: absolute; 
            bottom: 4px; 
            left: 4px; 
            width: 20px; height: 20px; 
            background-color: #2e7d32; border-radius: 50%; display: none; 
            align-items: center; justify-content: center; color: white; font-size: 12px; border: 2px solid white;
            z-index: 2;
        }
        .all-done .done-check { display: flex; }

        .card-lv {
            font-size: 15px !important; 
            font-weight: 900 !important; 
            color: #000 !important; 
            margin-top: 2px;
            margin-left: 22px; 
            width: 100%;
            text-align: left;
        }

        .training-guide { 
            flex-grow: 1; background-color: rgba(0, 0, 0, 0.75); padding: 35px; 
            border-radius: 20px; height: 90%; overflow-y: auto; scroll-behavior: smooth;
        }

        .status-circle { 
            width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; transition: 0.2s;
        }

        #owned-indicator { color: transparent; background-color: transparent; }
        .is-owned #owned-indicator { color: #4caf50; border-color: #4caf50; }
        
        .guide-item-row .status-circle { background-color: #555; border-color: #888; color: transparent; }
        .guide-item-row.status-1 .status-circle { background-color: #4caf50; border-color: #4caf50; color: transparent; } 
        .guide-item-row.status-2 .status-circle { background-color: #f44336; border-color: #f44336; color: transparent; } 
        .guide-item-row.status-3 .status-circle { background-color: #ff9800; border-color: #ff9800; color: transparent; } 
        
        .guide-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .header-owned { display: flex; align-items: center; gap: 10px; margin-top: 10px; cursor: pointer; width: fit-content; }
        .header-owned span { font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="grid-wrapper">
        <div class="filters">
            <button class="back-btn" onclick="window.location.href='Dashboard.html'">🏠 Dashboard View</button>
            <select id="f-rarity" onchange="filter()"><option value="all">Rarity</option><option value="5">5 Ster</option><option value="4">4 Ster</option></select>
            <select id="f-element" onchange="filter()"><option value="all">Element</option><option value="Anemo">Anemo</option><option value="Geo">Geo</option><option value="Electro">Electro</option><option value="Dendro">Dendro</option><option value="Hydro">Hydro</option><option value="Pyro">Pyro</option><option value="Cryo">Cryo</option></select>
            <select id="f-owned" onchange="filter()"><option value="all">Own</option><option value="owned">Owned</option><option value="unowned">Unowned</option></select>
        </div>
        <div class="character-grid" id="grid"></div>
    </div>
    
    <div class="training-guide" id="guide-box" style="display:none;">
        <div style="display:flex; align-items:center; gap:25px; margin-bottom:30px;">
            <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
                <div id="p-pic" style="width:130px; height:130px; border-radius:50%; border:4px solid #fbc02d; background-size:cover;"></div>
                <div id="guide-lv" style="display:none; color:#ffe14b; font-weight:bold; font-size:26px; background:rgba(0,0,0,0.7); padding:6px 16px; border-radius:8px; margin-top:6px; letter-spacing:1px; text-shadow:1px 1px 4px #000;"></div>
            </div>
            <div>
                <h1 id="active-name" style="color:#fbc02d; margin:0; font-size:32px;"></h1>
                <div class="header-owned" id="main-owned-toggle" onclick="toggleOwned()">
                    <div class="status-circle" id="owned-indicator">✓</div>
                    <span>Owned</span>
                </div>
            </div>
        </div>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">
        <div id="tasks"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script>
    // Firebase Konfigurasie
    const firebaseConfig = {
        apiKey: "AIzaSyBoCKHkd1FhfNeFMnJInkqqgiX0GCjAJAQ",

    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const characters = { "Aino":{r:4,e:"Hydro",o:false},"Albedo":{r:5,e:"Geo",o:false},"Alhaitham":{r:5,e:"Dendro",o:false},"Aloy":{r:5,e:"Cryo",o:false},"Amber":{r:4,e:"Pyro",o:false},"Arataki Itto":{r:5,e:"Geo",o:false},"Arlecchino":{r:5,e:"Pyro",o:false},"Baizhu":{r:5,e:"Dendro",o:false},"Barbara":{r:4,e:"Hydro",o:false},"Beidou":{r:4,e:"Electro",o:false},"Bennett":{r:4,e:"Pyro",o:false},"Candace":{r:4,e:"Hydro",o:false},"Charlotte":{r:4,e:"Cryo",o:false},"Chasca":{r:5,e:"Anemo",o:false},"Chevreuse":{r:4,e:"Pyro",o:false},"Chiori":{r:5,e:"Geo",o:false},"Chongyun":{r:4,e:"Cryo",o:false},"Citlali":{r:5,e:"Cryo",o:false},"Clorinde":{r:5,e:"Electro",o:false},"Collei":{r:4,e:"Dendro",o:false},"Columbina":{r:5,e:"Hydro",o:false},"Cyno":{r:5,e:"Electro",o:false},"Dahlia":{r:4,e:"Hydro",o:false},"Dehya":{r:5,e:"Pyro",o:false},"Diluc":{r:5,e:"Pyro",o:false},"Diona":{r:4,e:"Cryo",o:false},"Dori":{r:4,e:"Electro",o:false},"Durin":{r:5,e:"Pyro",o:false},"Emilie":{r:5,e:"Dendro",o:false},"Escoffier":{r:5,e:"Cryo",o:false},"Eula":{r:5,e:"Cryo",o:false},"Faruzan":{r:4,e:"Anemo",o:false},"Fischl":{r:4,e:"Electro",o:false},"Flins":{r:5,e:"Electro",o:false},"Freminet":{r:4,e:"Cryo",o:false},"Furina":{r:5,e:"Hydro",o:false},"Gaming":{r:4,e:"Pyro",o:false},"Ganyu":{r:5,e:"Cryo",o:false},"Gorou":{r:4,e:"Geo",o:false},"Hu Tao":{r:5,e:"Pyro",o:false},"Iansan":{r:4,e:"Electro",o:false},"Ifa":{r:4,e:"Anemo",o:false},"Illuga":{r:4,e:"Geo",o:false},"Ineffa":{r:5,e:"Electro",o:false},"Jahoda":{r:4,e:"Anemo",o:false},"Jean":{r:5,e:"Anemo",o:false},"Kachina":{r:4,e:"Geo",o:false},"Kaedehara Kazuha":{r:5,e:"Anemo",o:false},"Kaeya":{r:4,e:"Cryo",o:false},"Kamisato Ayaka":{r:5,e:"Cryo",o:false},"Kamisato Ayato":{r:5,e:"Hydro",o:false},"Kaveh":{r:4,e:"Dendro",o:false},"Keqing":{r:5,e:"Electro",o:false},"Kinich":{r:5,e:"Dendro",o:false},"Kirara":{r:4,e:"Dendro",o:false},"Klee":{r:5,e:"Pyro",o:false},"Kujou Sara":{r:4,e:"Electro",o:false},"Kuki Shinobu":{r:4,e:"Electro",o:false},"Lan Yan":{r:4,e:"Anemo",o:false},"Lauma":{r:5,e:"Dendro",o:false},"Layla":{r:4,e:"Cryo",o:false},"Lisa":{r:4,e:"Electro",o:false},"Lynette":{r:4,e:"Anemo",o:false},"Lyney":{r:5,e:"Pyro",o:false},"Mavuika":{r:5,e:"Pyro",o:false},"Mika":{r:4,e:"Cryo",o:false},"Mona":{r:5,e:"Hydro",o:false},"Mualani":{r:5,e:"Hydro",o:false},"Nahida":{r:5,e:"Dendro",o:false},"Navia":{r:5,e:"Geo",o:false},"Nefer":{r:5,e:"Dendro",o:false},"Neuvillette":{r:5,e:"Hydro",o:false},"Nilou":{r:5,e:"Hydro",o:false},"Ningguang":{r:4,e:"Geo",o:false},"Noelle":{r:4,e:"Geo",o:false},"Ororon":{r:4,e:"Electro",o:false},"Qiqi":{r:5,e:"Cryo",o:false},"Raiden Shogun":{r:5,e:"Electro",o:false},"Razor":{r:4,e:"Electro",o:false},"Rosaria":{r:4,e:"Cryo",o:false},"Sangonomiya Kokomi":{r:5,e:"Hydro",o:false},"Sayu":{r:4,e:"Anemo",o:false},"Sethos":{r:4,e:"Electro",o:false},"Shenhe":{r:5,e:"Cryo",o:false},"Shikanoin Heizou":{r:4,e:"Anemo",o:false},"Sigewinne":{r:5,e:"Hydro",o:false},"Skirk":{r:5,e:"Cryo",o:false},"Sucrose":{r:4,e:"Anemo",o:false},"Tartaglia":{r:5,e:"Hydro",o:false},"Thoma":{r:4,e:"Pyro",o:false},"Tighnari":{r:5,e:"Dendro",o:false},"Traveler Anemo":{r:5,e:"Anemo",o:false},"Traveler Geo":{r:5,e:"Geo",o:false},"Traveler Electro":{r:5,e:"Electro",o:false},"Traveler Hydro":{r:5,e:"Hydro",o:false},"Traveler Pyro":{r:5,e:"Pyro",o:false},"Traveler Dendro":{r:5,e:"Dendro",o:false},"Varesa":{r:5,e:"Electro",o:false},"Varka":{r:5,e:"Anemo",o:false},"Venti":{r:5,e:"Anemo",o:false},"Wanderer":{r:5,e:"Anemo",o:false},"Wriothesley":{r:5,e:"Cryo",o:false},"Xiangling":{r:4,e:"Pyro",o:false},"Xianyun":{r:5,e:"Anemo",o:false},"Xiao":{r:5,e:"Anemo",o:false},"Xilonen":{r:5,e:"Geo",o:false},"Xingqiu":{r:4,e:"Hydro",o:false},"Xinyan":{r:4,e:"Pyro",o:false},"Yae Miko":{r:5,e:"Electro",o:false},"Yanfei":{r:4,e:"Pyro",o:false},"Yaoyao":{r:4,e:"Dendro",o:false},"Yelan":{r:5,e:"Hydro",o:false},"Yoimiya":{r:5,e:"Pyro",o:false},"Yumemizuki Mizuki":{r:5,e:"Anemo",o:false},"Yun Jin":{r:4,e:"Geo",o:false},"Zhongli":{r:5,e:"Geo",o:false},"Zibai":{r:5,e:"Geo",o:false},"Linnea":{r:5,e:"Geo",o:false} };

    let current = null;
    let userPath = "";

    // Wag vir user om in te log
    auth.onAuthStateChanged(user => {
        if (user) {
            userPath = `users/${user.uid}`;
            syncFromFirebase();
        } else {
            window.location.href = "login.html";
        }
    });

    function syncFromFirebase() {
        db.ref(userPath).on('value', snapshot => {
            const data = snapshot.val() || {};
            const owned = data.ownedCharacters || [];
            const details = data.characterDetails || {};
            
            // Update character owned status
            Object.keys(characters).forEach(name => {
                characters[name].o = owned.includes(name);
                updateCardLV(name, details[name]);
                checkAllDoneUI(name, data.guideProgress?.[name]);
            });
            
            if (current) {
                updateOwnedUI();
                updateGuideLV(current, details[current]);
                refreshTasks(data.guideProgress?.[current], details[current]);
            }
            filter();
        });
    }

    function updateCardLV(name, charData) {
        const card = document.getElementById('card-'+name.replace(/\s+/g,'-'));
        if (!card) return;
        const lvDiv = card.querySelector('.card-lv');
        if (characters[name].o && charData?.sel_1) {
            lvDiv.style.display = 'block';
            lvDiv.textContent = `LV: ${charData.sel_1}`;
        } else {
            lvDiv.style.display = 'none';
        }
    }

    function toggleOwned() {
        if (!current || !userPath) return;
        const newState = !characters[current].o;
        db.ref(`${userPath}/ownedCharacters`).once('value', snap => {
            let owned = snap.val() || [];
            if (newState) {
                if (!owned.includes(current)) owned.push(current);
            } else {
                owned = owned.filter(n => n !== current);
            }
            db.ref(`${userPath}/ownedCharacters`).set(owned);
        });
    }

    function updateOwnedUI() {
        const container = document.getElementById('main-owned-toggle');
        container.classList.toggle('is-owned', characters[current].o);
    }

    function updateGuideLV(name, charData) {
        const lvEl = document.getElementById('guide-lv');
        if (characters[name].o && charData?.sel_1) {
            lvEl.textContent = charData.sel_2 ? `LV: ${charData.sel_1} → ${charData.sel_2}` : `LV: ${charData.sel_1}`;
            lvEl.style.display = 'block';
        } else {
            lvEl.style.display = 'none';
        }
    }

    function filter() {
        const r = document.getElementById('f-rarity').value;
        const e = document.getElementById('f-element').value;
        const o = document.getElementById('f-owned').value;
        Object.keys(characters).forEach(name => {
            const card = document.getElementById('card-'+name.replace(/\s+/g,'-'));
            if(!card) return;
            const mR = r==='all' || characters[name].r.toString()===r;
            const mE = e==='all' || characters[name].e===e;
            const mO = o==='all' || (o==='owned'?characters[name].o:!characters[name].o);
            card.style.display = (mR && mE && mO) ? 'flex' : 'none';
        });
    }

    // Bou die grid
    Object.keys(characters).forEach(name => {
        const card = document.createElement('div');
        card.className = 'char-card'; card.id = 'card-'+name.replace(/\s+/g,'-');
        const img = name.includes("Traveler") ? characters[name].e + "1.jpg" : name + "1.jpg";
        card.innerHTML = `
            <div class="done-check">✓</div>
            <div class="char-icon" style="background-image:url('${img}')"></div>
            <div style="padding:5px; width:100%; box-sizing:border-box;">
                <div class="card-lv" style="display:none;"></div>
            </div>`;
        
        card.onclick = () => {
            current = name; 
            document.getElementById('guide-box').style.display='block';
            document.getElementById('active-name').innerText = name;
            document.getElementById('p-pic').style.backgroundImage = `url('${name.includes("Traveler")?characters[name].e+".jpg":name+".jpg"}')`;
            syncFromFirebase(); 
        };
        document.getElementById('grid').appendChild(card);
    });

    const taskToCircleIndex = {
        "Character": 0, "Weapons [Now]": 1, "Artifacts": 2, "Talents": 3, "Ascension": 4, "Weapon [Future] ★★★★": 5, "Weapon [Future] ★★★★★": 6
    };

    function refreshTasks(prog, cvData) {
        const tBox = document.getElementById('tasks'); tBox.innerHTML = '';
        const taskList = Object.keys(taskToCircleIndex);
        
        taskList.forEach(t => {
            const row = document.createElement('div'); 
            row.className = `guide-item-row`;
            row.innerHTML = `
                <div style="font-size:20px; font-weight:bold;">${t}</div>
                <div class="status-circle" id="tg-circle-${t.replace(/\s+/g,'-').replace(/[★]/g,'s')}" style="cursor:default;"></div>`;
            tBox.appendChild(row);

            // Kleur die sirkel gebaseer op CharacterView data
            const idx = taskToCircleIndex[t];
            const color = cvData?.['circle_' + idx] || 'rgb(85, 85, 85)';
            const circleEl = document.getElementById('tg-circle-' + t.replace(/\s+/g,'-').replace(/[★]/g,'s'));
            if (circleEl) {
                circleEl.style.backgroundColor = color;
                circleEl.style.borderColor = color;
            }
        });
    }

    function checkAllDoneUI(charName, prog) {
        const card = document.getElementById('card-'+charName.replace(/\s+/g,'-'));
        if (!card) return;
        // In hierdie weergawe kyk ons of die core tasks op Firebase as voltooi gemerk is
        const coreTasks = ["Character", "Weapons [Now]", "Artifacts", "Talents", "Ascension"];
        const allGreen = coreTasks.every(t => prog?.[t] === 1);
        card.classList.toggle('all-done', allGreen);
    }
</script>
</body>
</html>
