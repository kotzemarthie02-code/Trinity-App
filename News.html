function toggleLock() {
  if (_unlocked) { setLocked(true); } 
  else {
    var pin = prompt('⚙️ Enter password:');
    if (pin === MY_PASSWORD) { setLocked(false); } 
    else { alert('❌ Wrong Password!'); }
  }
}

function setLocked(locked) {
  _unlocked = !locked;
  document.getElementById('lock-lbl').textContent = locked ? 'Settings' : '🔓 Unlocked';

  // 1. Sluit/Ontsluit alle teks-boksies
  document.querySelectorAll('input, textarea').forEach(i => {
    if(i.id !== 'dtm-inp' && i.id !== 'code-inp') i.readOnly = locked;
  });

  // 2. Sluit/Ontsluit die prente (picture kies)
  document.querySelectorAll('.pw, .timer-bg').forEach(el => {
    el.style.pointerEvents = locked ? 'none' : 'auto';
  });

  // 3. Sluit/Ontsluit die "Set Date" knoppies
  document.querySelectorAll('.set-btn').forEach(btn => {
    if (locked) {
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.5';
    } else {
      btn.style.pointerEvents = 'auto';
      btn.style.opacity = '1';
    }
  });
}

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderBdays() {
  const container = document.getElementById('bday-list');
  if (!container) return;
  const today = new Date();
  const todayMonth = today.getMonth() + 1;
  const todayDay = today.getDate();

  const parsed = charBirthdays.map(entry => {
    const parts = entry.split(' ');
    const dateStr = parts[parts.length - 1];
    const name = parts.slice(0, parts.length - 1).join(' ');
    const [m, d] = dateStr.split('/').map(Number);
    let diff = (m - todayMonth) * 31 + (d - todayDay);
    if (m < todayMonth || (m === todayMonth && d < todayDay)) diff += 365;
    return { name, m, d, diff };
  }).sort((a, b) => a.diff - b.diff);

  container.innerHTML = '';
  parsed.slice(0, 4).forEach(b => {
    const isToday = b.m === todayMonth && b.d === todayDay;
    const dateLabel = MONTH_NAMES[b.m - 1] + ' ' + b.d;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:8px 12px;';
    row.innerHTML = `<span style="font-size:18px;">${isToday ? '🎂✨' : '🎂'}</span>
      <span style="flex:1;font-size:13px;font-weight:${isToday?'900':'600'};color:${isToday?'#ffe08a':'white'};">${b.name}</span>
      <span style="font-size:12px;color:rgba(255,255,255,0.5);white-space:nowrap;">${dateLabel}${isToday?' 🎉':''}</span>`;
    container.appendChild(row);
  });
}

// ── DATE MODAL ──
let _dtTarget=null,_dtDisp=null,_dtPre='';
const clrMap={gold:'var(--gold)',blue:'var(--blue)',green:'var(--green)'};

function openDT(inpId,dispId,prefixText,color){
  event.stopPropagation();
  _dtTarget=inpId;_dtDisp=dispId;_dtPre=prefixText;
  document.getElementById('dtm-title').textContent='📅 '+prefixText;
  document.getElementById('dtm-title').style.color=clrMap[color]||'var(--gold)';
  const existing=document.getElementById(inpId);
  document.getElementById('dtm-inp').value=existing?existing.value:'';
  document.getElementById('dtm').classList.add('open');
}
function closeDT(){document.getElementById('dtm').classList.remove('open');_dtTarget=null;}
function clearDT(inpId,dispId,pre){
  var inp=document.getElementById(inpId);if(inp)inp.value='';
  var dp=document.getElementById(dispId);if(dp)dp.textContent=pre+': —';
  saveDates();
}
function applyDT(){
  const val=document.getElementById('dtm-inp').value;
  if(!val||!_dtTarget){closeDT();return;}
  const inp=document.getElementById(_dtTarget);
  if(inp)inp.value=val;
  const dp=document.getElementById(_dtDisp);
  if(dp)dp.textContent=_dtPre+': '+fmtFull(val);
  saveDates();
  closeDT();
}

function fmtFull(v){
  if(!v)return '—';
  return new Date(v).toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',hour:'numeric',minute:'2-digit'});
}
function fmtCD(ms){
  if(ms<=0)return['LIVE','00','00','00'];
  return[Math.floor(ms/86400000),String(Math.floor((ms%86400000)/3600000)).padStart(2,'0'),String(Math.floor((ms%3600000)/60000)).padStart(2,'0'),String(Math.floor((ms%60000)/1000)).padStart(2,'0')];
}

const tickers=[
  {inp:'cd1', ids:['t1d','t1h','t1m','t1s']},
  {inp:'cd2', ids:['t2d','t2h','t2m','t2s']},
  {inp:'p1d', ids:['p1dd','p1dh','p1dm','p1ds']},
  {inp:'p2d', ids:['p2dd','p2dh','p2dm','p2ds']},
  {inp:'live-date',ids:['lcd','lch','lcm','lcs']}
];

function tickAll(){
  const now=Date.now();
  tickers.forEach(t=>{
    const v=V(t.inp);
    const parts=v?fmtCD(new Date(v).getTime()-now):['--','--','--','--'];
    t.ids.forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=parts[i];});
  });
}
