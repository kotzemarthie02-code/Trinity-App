<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Genshin Impact - Login</title>
    <style>
        body {
            background: url('Login.jpg') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 15px;
            width: 380px;
            text-align: center;
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-group { position: relative; margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5);
            color: white;
            box-sizing: border-box;
        }
        .eye-icon { position: absolute; right: 12px; top: 10px; cursor: pointer; font-size: 20px; }
        
        #user-list {
            position: absolute;
            background: rgba(20, 20, 20, 0.95);
            width: 100%;
            border-radius: 5px;
            display: none;
            z-index: 10;
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
            border: 1px solid #444;
            max-height: 150px;
            overflow-y: auto;
        }
        #user-list li { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; }
        #user-list li:hover { background: #555; }
        
        .btn { background: white; color: black; width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link { margin-top: 15px; display: block; color: #ccc; cursor: pointer; text-decoration: underline; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBoCKHkd1FhfNeFMnJInkqqgiX0GCjAJAQ",
            authDomain: "trinityapp-28019.firebaseapp.com",
            projectId: "trinityapp-28019",
            storageBucket: "trinityapp-28019.firebasestorage.app",
            messagingSenderId: "72035223407",
            appId: "1:72035223407:web:b1a40d9ce96ae479be4a9a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Maak funksies beskikbaar vir die knoppies
        window.togglePass = (id) => {
            const x = document.getElementById(id);
            x.type = (x.type === "password") ? "text" : "password";
        };

        window.toggle = (mode) => {
            document.getElementById('login-box').style.display = (mode === 'login' ? 'block' : 'none');
            document.getElementById('reg-box').style.display = (mode === 'reg' ? 'block' : 'none');
        };

        window.register = async () => {
            const email = document.getElementById('r-email').value;
            const pass = document.getElementById('r-pass').value;
            const nick = document.getElementById('r-nick').value;
            const uid = document.getElementById('r-uid').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                
                // Stoor ekstra info in die databasis
                await set(ref(db, 'users/' + user.uid), {
                    nickname: nick,
                    uid: uid,
                    email: email
                });

                alert("Account created! Log in now.");
                toggle('login');
            } catch (error) {
                alert("Error: " + error.message);
            }
        };

        window.login = async () => {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                // Stoor uid sodat ALLE lêers weet wie ingeteken is
                localStorage.setItem('trinity_uid', user.uid);
                window.location.href = "Dashboard.html";
            } catch (error) {
                alert("Login failed: " + error.message);
            }
        };
    </script>
</head>
<body>

<div class="card">
    <h2>Genshin Impact</h2>
    <div id="login-box">
        <div class="input-group">
            <input type="text" id="l-email" placeholder="Email" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="l-pass" placeholder="Password">
            <span class="eye-icon" onclick="togglePass('l-pass')">👁️</span>
        </div>
        <button class="btn" onclick="login()">LOG IN</button>
        <span class="link" onclick="toggle('reg')">Register New Account</span>
    </div>

    <div id="reg-box" style="display:none;">
        <div class="input-group"><input type="text" id="r-email" placeholder="Email"></div>
        <div class="input-group"><input type="text" id="r-nick" placeholder="Nickname"></div>
        <div class="input-group"><input type="text" id="r-uid" placeholder="UID"></div>
        <div class="input-group">
            <input type="password" id="r-pass" placeholder="Password">
            <span class="eye-icon" onclick="togglePass('r-pass')">👁️</span>
        </div>
        <button class="btn" onclick="register()">CREATE ACCOUNT</button>
        <span class="link" onclick="toggle('login')">Back to Login</span>
    </div>
</div>

</body>
</html>
