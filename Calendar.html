<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
      import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
      import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBoCKHkd1FhfNeFMnJInkqqgiX0GCjAJAQ",
        authDomain: "trinityapp-28019.firebaseapp.com",
        databaseURL: "https://trinityapp-28019-default-rtdb.firebaseio.com",
        projectId: "trinityapp-28019",
        storageBucket: "trinityapp-28019.firebasestorage.app",
        messagingSenderId: "72035223407",
        appId: "1:72035223407:web:b1a40d9ce96ae479be4a9a"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getDatabase(app);

      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "index.html";
        } else {
          localStorage.setItem('trinity_uid', user.uid);
        }
      });

      // Luister vir gedeelde kalender notes — alle gebruikers sien dieselfde
      onValue(ref(db, 'sharedData/calendarNotes'), (snapshot) => {
        const data = snapshot.val();
        localStorage.setItem('cal_save_data', JSON.stringify(data || {}));
        if (window.renderCalendar) window.renderCalendar();
      });

      // Stoor notes na Firebase sharedData — almal sien update outomaties
      window.saveCalendarToFirebase = function(notesData) {
        set(ref(db, 'sharedData/calendarNotes'), notesData);
        // Timestamp — Dashboard wys ! vir almal
        set(ref(db, 'sharedData/lastUpdated/calendar'), Date.now());
      };
    </script>

    <title>Genshin Event Calendar</title>
    <style>
        :root {
            --gold: #f3d18b;
            --border: rgba(243, 209, 139, 0.3);
            --blue: #00d4ff;
            --green: #33ff77;
            --red: #ff4d4d;
            --purple: #cc66ff;
        }

        body {
            background: url('Calendar.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            margin: 0;
            padding: 10px 20px;
            min-height: 100vh;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .nav-controls { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
            flex: 1; 
        }

        .nav-btn { 
            background: rgba(0, 0, 0, 0.6); 
            border: 2px solid var(--green); 
            color: white; 
            font-size: 22px; 
            font-weight: bold;
            cursor: pointer; 
            border-radius: 8px; 
            width: 45px; 
            height: 45px; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: var(--green);
            color: black;
            transform: scale(1.1);
        }

        .month-title { 
            font-size: 24px; 
            font-weight: 900; 
            color: var(--gold); 
            text-transform: uppercase; 
            min-width: 220px; 
            text-align: center; 
            letter-spacing: 2px;
        }

        .lock-btn {
            background: #ff4d4d; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
            transition: 0.3s;
        }
        .lock-btn.unlocked { background: #4bff7d; color: black; }

        .calendar-container {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 50px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-header {
            background: rgba(0, 0, 0, 0.7);
            color: var(--gold);
            text-align: center;
            padding: 15px;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .day-box {
            background: rgba(15, 15, 25, 0.9);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
        }

        .day-num { font-size: 18px; font-weight: bold; opacity: 0.6; margin-bottom: 10px; }
        .today { border: 2px solid var(--blue); background: rgba(0, 212, 255, 0.1); }
        .today .day-num { opacity: 1; color: var(--blue); }

        .notes-list { display: flex; flex-direction: column; gap: 8px; }
        .note-item { display: flex; align-items: center; gap: 10px; padding: 4px; border-radius: 4px; }
        
        .note-pin {
            width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
            box-shadow: 0 0 10px currentColor;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .note-text { font-size: 14px; font-weight: 700; color: white; text-shadow: 1px 1px 2px black; }

        .add-note-btn {
            display: none; width: 100%; background: rgba(243, 209, 139, 0.1);
            border: 1px dashed var(--gold); color: var(--gold);
            cursor: pointer; font-size: 11px; border-radius: 4px;
            margin-top: 15px; padding: 6px; font-weight: bold;
        }
        .unlocked .add-note-btn { display: block; }

        /* Note Modal */
        .note-modal-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7); z-index: 9999;
            align-items: center; justify-content: center;
        }
        .note-modal-overlay.open { display: flex; }
        .note-modal {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px; padding: 24px; width: 380px; max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .note-modal h3 { margin: 0 0 16px; color: var(--gold); font-size: 16px; }
        .note-modal input[type=text] {
            width: 100%; padding: 10px 12px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);
            color: white; font-size: 14px; box-sizing: border-box; margin-bottom: 16px;
        }
        .note-modal input[type=text]:focus { outline: none; border-color: var(--gold); }
        .modal-section-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }

        /* Kleur swatches */
        .color-swatches {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
        }
        .color-swatch {
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: 0.15s; flex-shrink: 0;
        }
        .color-swatch:hover { transform: scale(1.2); }
        .color-swatch.selected { border-color: white; transform: scale(1.15); }

        /* Emoji picker */
        .emoji-grid {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
            max-height: 120px; overflow-y: auto;
        }
        .emoji-btn {
            width: 32px; height: 32px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center; transition: 0.15s;
        }
        .emoji-btn:hover, .emoji-btn.selected { background: rgba(255,255,255,0.2); transform: scale(1.1); }

        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
        .modal-btn {
            padding: 9px 20px; border-radius: 8px; border: none; font-weight: bold;
            cursor: pointer; font-size: 14px; transition: 0.2s;
        }
        .modal-btn.cancel { background: rgba(255,255,255,0.1); color: white; }
        .modal-btn.confirm { background: var(--gold); color: black; }
        .modal-btn:hover { opacity: 0.85; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="Dashboard.html" class="dash-back" style="text-decoration:none;color:white;font-size:16px;display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.5);padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);">🏠 Dashboard</a>
        
        <div class="nav-controls">
            <button class="nav-btn" onclick="changeMonth(-1)">&lt;</button>
            <div class="month-title" id="monthDisplay">MONTH 2026</div>
            <button class="nav-btn" onclick="changeMonth(1)">&gt;</button>
        </div>

        <button class="lock-btn" id="mainLockButton" onclick="toggleLock()">
            <span id="lockIcon">🔒</span> <span id="lockText">LOCKED</span>
        </button>
    </div>

    <div class="calendar-container" id="mainContainer">
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- Note Modal -->
    <div class="note-modal-overlay" id="noteModalOverlay">
        <div class="note-modal">
            <h3>📝 Voeg Note By</h3>
            <input type="text" id="modalNoteText" placeholder="Skryf jou note...">

            <div class="modal-section-label">🎨 Kies Kleur</div>
            <div class="color-swatches" id="colorSwatches"></div>

            <div class="modal-section-label">😊 Voeg Emoji By (opsioneel)</div>
            <div class="emoji-grid" id="emojiGrid"></div>

            <div class="modal-btns">
                <button class="modal-btn cancel" onclick="closeNoteModal()">Kanselleer</button>
                <button class="modal-btn confirm" onclick="confirmNote()">✓ Stoor</button>
            </div>
        </div>
    </div>

    <script>
        window.renderCalendar = renderCalendar;
        window.onload = () => {
            buildModal();
            renderCalendar();
        };

        let isLocked = true;
        let currentViewDate = new Date();
        let _pendingDateKey = null;
        let _selectedColor = '#ffcc00';
        let _selectedEmoji = '';

        const _0x4f2a = "b3duZXI=";

        // Alle kleure soos Word colour picker
        const allColors = [
            '#ff4d4d','#ff8c42','#ffcc00','#ffe08a','#a5ffad','#33ff77','#00d4ff',
            '#4da6ff','#cc66ff','#ff66b3','#ffffff','#aaaaaa','#555555','#1a1a2e',
            '#ff6b6b','#ffd700','#00ffcc','#7b2fff','#ff3cac','#2de2e6','#f5a623',
            '#43e97b','#fa709a','#4facfe','#a18cd1','#ffecd2','#c471ed','#30cfd0'
        ];

        // Emoji lys
        const emojiList = [
            '🎉','🎂','🎁','⚔️','🛡️','🌟','💎','🔥','❄️','⚡',
            '🌸','🎯','📅','⏰','🏆','💫','🌙','☀️','🌊','🎮',
            '✅','❌','⚠️','📌','💡','🔔','🎪','🌈','💜','💛',
            '❤️','💚','💙','🖤','🤍','🎵','🎶','🍰','🥳','🏅'
        ];

        function buildModal() {
            // Bou kleur swatches
            const sw = document.getElementById('colorSwatches');
            allColors.forEach(c => {
                const d = document.createElement('div');
                d.className = 'color-swatch' + (c === _selectedColor ? ' selected' : '');
                d.style.background = c;
                d.onclick = () => {
                    _selectedColor = c;
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                    d.classList.add('selected');
                };
                sw.appendChild(d);
            });
            // Bou emoji grid
            const eg = document.getElementById('emojiGrid');
            // Leë opsie
            const none = document.createElement('div');
            none.className = 'emoji-btn selected'; none.textContent = '✕';
            none.title = 'Geen emoji';
            none.onclick = () => { _selectedEmoji = ''; document.querySelectorAll('.emoji-btn').forEach(e=>e.classList.remove('selected')); none.classList.add('selected'); };
            eg.appendChild(none);
            emojiList.forEach(em => {
                const b = document.createElement('div');
                b.className = 'emoji-btn'; b.textContent = em;
                b.onclick = () => {
                    _selectedEmoji = em;
                    document.querySelectorAll('.emoji-btn').forEach(e => e.classList.remove('selected'));
                    b.classList.add('selected');
                };
                eg.appendChild(b);
            });
        }

        function addNote(dateKey) {
            if (isLocked) return;
            _pendingDateKey = dateKey;
            _selectedEmoji = '';
            document.getElementById('modalNoteText').value = '';
            // Reset emoji selection
            document.querySelectorAll('.emoji-btn').forEach(e => e.classList.remove('selected'));
            document.querySelector('.emoji-btn').classList.add('selected');
            document.getElementById('noteModalOverlay').classList.add('open');
            setTimeout(() => document.getElementById('modalNoteText').focus(), 100);
        }

        function closeNoteModal() {
            document.getElementById('noteModalOverlay').classList.remove('open');
        }

        function confirmNote() {
            const rawText = document.getElementById('modalNoteText').value.trim();
            if (!rawText) { alert('Skryf eers \'n note!'); return; }
            const text = _selectedEmoji ? _selectedEmoji + ' ' + rawText : rawText;
            let notesData = JSON.parse(localStorage.getItem('cal_save_data') || '{}');
            if (!notesData[_pendingDateKey]) notesData[_pendingDateKey] = [];
            notesData[_pendingDateKey].push({ text, color: _selectedColor });
            localStorage.setItem('cal_save_data', JSON.stringify(notesData));
            if (window.saveCalendarToFirebase) window.saveCalendarToFirebase(notesData);
            closeNoteModal();
            renderCalendar();
        }

        // Sluit modal as jy buite klik
        document.getElementById('noteModalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeNoteModal();
        });

        function toggleLock() {
            if (isLocked) {
                let pw = prompt("⚙️ Enter PIN to unlock editing:");
                if (btoa(pw) === _0x4f2a) { 
                    isLocked = false; 
                } else { 
                    alert("❌ Wrong Password!"); 
                    return; 
                }
            } else { 
                isLocked = true; 
            }
            updateUI();
        }

        function updateUI() {
            const btn = document.getElementById('mainLockButton');
            const icon = document.getElementById('lockIcon');
            const text = document.getElementById('lockText');
            const container = document.getElementById('mainContainer');
            if (isLocked) {
                btn.classList.remove('unlocked'); icon.innerText = "🔒"; text.innerText = "LOCKED"; container.classList.remove('unlocked');
            } else {
                btn.classList.add('unlocked'); icon.innerText = "🔓"; text.innerText = "EDIT MODE"; container.classList.add('unlocked');
            }
            renderCalendar();
        }

        function changeMonth(offset) {
            currentViewDate.setMonth(currentViewDate.getMonth() + offset);
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthDisplay = document.getElementById('monthDisplay');
            grid.innerHTML = `<div class="day-header">Sun</div><div class="day-header">Mon</div><div class="day-header">Tue</div><div class="day-header">Wed</div><div class="day-header">Thu</div><div class="day-header">Fri</div><div class="day-header">Sat</div>`;
            
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            monthDisplay.innerText = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const notesData = JSON.parse(localStorage.getItem('cal_save_data') || '{}');

            for(let i=0; i<firstDay; i++) {
                grid.innerHTML += `<div class="day-box" style="opacity:0.1; border:none;"></div>`;
            }

            for(let d=1; d<=daysInMonth; d++) {
                const dateKey = `${year}-${month + 1}-${d}`;
                const today = new Date();
                const isToday = (today.getDate() === d && today.getMonth() === month && today.getFullYear() === year) ? 'today' : '';
                
                let notesHtml = '';

                if(notesData[dateKey]) {
                    notesData[dateKey].forEach((n, idx) => {
                        notesHtml += `<div class="note-item" onclick="deleteNote('${dateKey}', ${idx})"><div class="note-pin" style="background-color: ${n.color}"></div><div class="note-text">${n.text}</div></div>`;
                    });
                }

                grid.innerHTML += `
                    <div class="day-box ${isToday}">
                        <div class="day-num">${d}</div>
                        <div class="notes-list">${notesHtml}</div>
                        <button class="add-note-btn" onclick="addNote('${dateKey}')">+ NOTE</button>
                    </div>`;
            }
        }

        function deleteNote(dateKey, idx) {
    if(isLocked) return;
    if(confirm("Delete hierdie nota?")) {
        let notesData = JSON.parse(localStorage.getItem('cal_save_data') || '{}');
        notesData[dateKey].splice(idx, 1);
        if (notesData[dateKey].length === 0) {
            delete notesData[dateKey];
        }
        localStorage.setItem('cal_save_data', JSON.stringify(notesData));
        // Stoor na Firebase — almal sien dit outomaties
        if(window.saveCalendarToFirebase) window.saveCalendarToFirebase(notesData);
        renderCalendar();
    }
}
    </script>
</body>
</html>
